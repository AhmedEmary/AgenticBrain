name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SH_PRIVATE_KEY }}
          script: |
            echo "Starting deployment..."
            cd /opt/odoo/custom_addons/AgenticBrain
            
            # Tell Git this folder is safe for the root user to modify
            git config --global --add safe.directory /opt/odoo/custom_addons/AgenticBrain
            
            # Pull the latest code using the PAT for authentication
            git pull https://AhmedElemary57:${{ secrets.PAT }}@github.com/AhmedElemary57/AgenticBrain.git main
            
            # Ensure Odoo owns all files including the newly downloaded ones
            sudo chown -R odoo:odoo /opt/odoo/custom_addons/AgenticBrain
            
            # Restart the Odoo server to load the new code
            sudo systemctl restart odoo
            
            echo "Deployment successful!"
